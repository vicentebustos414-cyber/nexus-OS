[Manager]
# NexusOS Boot Optimization

# Increase parallelism for faster boot
DefaultTimeoutStartSec=10s
DefaultTimeoutStopSec=10s

# Allow more concurrent processes
DefaultStartLimitBurst=10
DefaultStartLimitIntervalSec=60s

# Reduce journal retention (less disk I/O on boot)
# Storage=persistent
# MaxRetentionSec=1month
