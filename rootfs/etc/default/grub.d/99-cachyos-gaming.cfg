# GRUB Boot Parameters for NexusOS Pro (CachyOS)
# Parámetros del kernel para máximo rendimiento gaming

# Base de parámetros
export GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"

# ═══════════════════════════════════════════════════════════════
# I/O SCHEDULER - Deadline (mejor para gaming)
# ═══════════════════════════════════════════════════════════════
export GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT elevator=deadline"

# ═══════════════════════════════════════════════════════════════
# CLOCK SOURCE - Más preciso para gaming
# ═══════════════════════════════════════════════════════════════
# Use TSC (Time Stamp Counter) en CPUs modernas
export GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT clocksource=tsc tsc=reliable"

# ═══════════════════════════════════════════════════════════════
# CPU GOVERNOR - Performance (máximo)
# ═══════════════════════════════════════════════════════════════
# Nota: Puede configurarse también via cpupower
# export GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT cpufreq.default_governor=performance"

# ═══════════════════════════════════════════════════════════════
# MITIGACIONES - Seguridad vs Rendimiento
# ═══════════════════════════════════════════════════════════════
# Spectre/Meltdown: Mitigar pero con overhead mínimo
export GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT mitigations=auto"

# ═══════════════════════════════════════════════════════════════
# POWER MANAGEMENT - Deshabilitar throttling
# ═══════════════════════════════════════════════════════════════
# intel_pstate: Use performance mode en Intel
# export GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT intel_pstate=performance"

# ═══════════════════════════════════════════════════════════════
# PREEMPTION - BORE ya lo optimiza, pero podemos forzar
# ═══════════════════════════════════════════════════════════════
# BORE está compilado con CONFIG_PREEMPT=y (máximo preemption)
# No necesita parámetro extra

# ═══════════════════════════════════════════════════════════════
# SWAPPING - Desabilitar para gaming
# ═══════════════════════════════════════════════════════════════
# Usar vm.swappiness=5 en sysctl (ya configurado)

# ═══════════════════════════════════════════════════════════════
# USB - Legacy support (opcional, para controllers)
# ═══════════════════════════════════════════════════════════════
# export GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT usbhid.quirks=0x0810:0xe501:0x00000403"

# ═══════════════════════════════════════════════════════════════
# DEBUG - Deshabilitar para rendimiento máximo
# ═══════════════════════════════════════════════════════════════
# export GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT debug"

# ═══════════════════════════════════════════════════════════════
# IOMMU - GPU passthrough (si aplica)
# ═══════════════════════════════════════════════════════════════
# export GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT iommu=pt"

# ═══════════════════════════════════════════════════════════════
# RESULT
# ═══════════════════════════════════════════════════════════════

# Final GRUB command line:
# quiet splash elevator=deadline clocksource=tsc tsc=reliable mitigations=auto

echo "GRUB Parameters for NexusOS Pro (CachyOS) loaded"
echo "Kernel: linux-cachyos + BORE Scheduler"
echo "I/O Scheduler: deadline"
echo "Optimized for: Gaming, Low Latency"
