# Pipewire Gaming Audio Configuration
# Low-latency audio for gaming

context.properties = {
    # Node defaults
    default.clock.allowed-rates = [ 44100 48000 96000 192000 ]
    default.clock.quantum = 512
    default.clock.min-quantum = 256
    default.clock.max-quantum = 8192
}

# Gaming profile - minimal latency
profiles.gaming = {
    # Lower quantum for lower latency (frames)
    default.clock.quantum = 128
    default.clock.min-quantum = 64
    # Force high priority
    core.daemon = true
}

# Default to gaming profile if available
default.profile = gaming
