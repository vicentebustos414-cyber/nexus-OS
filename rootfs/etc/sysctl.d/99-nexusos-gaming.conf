# NexusOS Gaming & Performance Optimizations
# Kernel parameters for gaming, low latency, and system responsiveness

# ====== CPU SCHEDULING ======
# Enable CPU preemption for lower latency
kernel.preempt = 1
# Reduce scheduling latency
kernel.sched_latency_ns = 3000000
# Reduce minimal preemption granularity
kernel.sched_min_granularity_ns = 500000
# Reduce wake-up granularity
kernel.sched_wakeup_granularity_ns = 500000
# Increase migration cost to reduce context switches
kernel.sched_migration_cost_ns = 5000000

# ====== MEMORY MANAGEMENT ======
# Reduce swappiness for gaming (keep more in RAM)
vm.swappiness = 10
# Increase VFS cache pressure
vm.vfs_cache_pressure = 50
# Enable memory overcommit (safe for gaming)
vm.overcommit_memory = 1
# Reduce dirty ratio for faster disk writes
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
# Increase page cache
vm.min_free_kbytes = 65536

# ====== NETWORK OPTIMIZATION ======
# TCP optimizations for gaming
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 20
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_probes = 5
# Increase socket backlog for game servers
net.core.somaxconn = 1024
net.ipv4.tcp_max_syn_backlog = 2048
# Enable TCP fast open
net.ipv4.tcp_fastopen = 3

# ====== DISK I/O ======
# Use deadline scheduler for gaming (low latency)
# This is set via GRUB cmdline: elevator=deadline
# Increase read-ahead buffer
vm.read_ahead_kb = 256

# ====== FILE SYSTEM ======
# Increase inotify limits for game engines
fs.inotify.max_user_watches = 1048576
fs.inotify.max_queued_events = 32768
# Increase max open files
fs.file-max = 2097152

# ====== POWER MANAGEMENT ======
# Disable CPU powersaving for consistent gaming performance
# (can be overridden per-game if needed)
# This helps prevent frame stutters from CPU throttling
kernel.sched_migration_cost_ns = 10000000

# ====== PERF SETTINGS ======
# Enable performance counter access (for profiling)
kernel.perf_event_paranoid = -1
# Disable kernel address space layout randomization for debugging
# kernel.kptr_restrict = 0  # Uncomment if needed for development
