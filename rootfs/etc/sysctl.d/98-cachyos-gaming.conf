# NexusOS Pro - CachyOS BORE Scheduler Optimization
# Configuración específica para máximo rendimiento gaming
# Basado en CachyOS + optimizaciones personalizadas

# ═══════════════════════════════════════════════════════════════
# BORE SCHEDULER (BORE = Burst-Oriented Response Enhancer)
# Reemplaza completamente el scheduler por defecto de Linux
# ═══════════════════════════════════════════════════════════════

# BORE está compilado en el kernel linux-cachyos
# No necesita configuración de sysctl, funciona automáticamente
# VENTAJAS sobre CFS:
#  • 40-50% menos latencia
#  • Mejor responsividad en gaming
#  • Mejor distribución de recursos
#  • Menor consumo en idle

# ═══════════════════════════════════════════════════════════════
# CPU TUNING PARA BORE SCHEDULER
# ═══════════════════════════════════════════════════════════════

# Deshabilitar migraciones innecesarias (BORE lo maneja bien)
kernel.sched_migration_cost_ns = 1000000

# Aumentar ventana de scheduling
kernel.sched_latency_ns = 10000000

# Granularidad mínima para tasks
kernel.sched_min_granularity_ns = 500000

# Wake-up granularity
kernel.sched_wakeup_granularity_ns = 500000

# ═══════════════════════════════════════════════════════════════
# MEMORIA - OPTIMIZADO PARA GAMING
# ═══════════════════════════════════════════════════════════════

# Mantener muy poca memoria en swap (máxima RAM en uso)
vm.swappiness = 5

# Agresivo con memoria en caché
vm.vfs_cache_pressure = 30

# Aumentar dirty ratio para mejor rendimiento
vm.dirty_ratio = 30
vm.dirty_background_ratio = 10

# ═══════════════════════════════════════════════════════════════
# I/O SCHEDULING - DEADLINE (mejor para gaming)
# ═══════════════════════════════════════════════════════════════

# Nota: El I/O scheduler se configura en GRUB (elevator=deadline)
# Deadline scheduler es óptimo para:
#  • Lecturas rápidas de juegos
#  • Baja latencia en guardado
#  • Mejor rendimiento que CFQ/BFQ

# ═══════════════════════════════════════════════════════════════
# NETWORK - GAMING OPTIMIZADO
# ═══════════════════════════════════════════════════════════════

# TCP Fast Open para juegos online
net.ipv4.tcp_fastopen = 3

# Deshabilitar Nagle (reduce latencia en red)
net.ipv4.tcp_nodelay = 1

# Buffer sizes para gaming (baja latencia)
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.ipv4.tcp_rmem = 4096 87380 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864

# Aumentar backlog de sockets
net.core.somaxconn = 4096
net.ipv4.tcp_max_syn_backlog = 8192

# ═══════════════════════════════════════════════════════════════
# FILE SYSTEM - GAMING ASSETS LOADING
# ═══════════════════════════════════════════════════════════════

# inotify para game engines que monitorean archivos
fs.inotify.max_user_watches = 2097152
fs.inotify.max_queued_events = 65536

# Max file descriptors
fs.file-max = 4194304

# ═══════════════════════════════════════════════════════════════
# POWER MANAGEMENT - RENDIMIENTO MÁXIMO
# ═══════════════════════════════════════════════════════════════

# Preemption: RCU Grace Period Delay Redistribution
# (No throttle en gaming)
kernel.sched_migration_cost_ns = 1000000

# ═══════════════════════════════════════════════════════════════
# SECURITY - BALANCED (sin sacrificar rendimiento)
# ═══════════════════════════════════════════════════════════════

# ASLR activado pero optimizado
kernel.randomize_va_space = 2

# Mitigaciones de spectre/meltdown (overhead mínimo en CachyOS)
# kernel.kptr_restrict = 1
# kernel.dmesg_restrict = 1

# ═══════════════════════════════════════════════════════════════
# DEBUG - LOGGING OPCIONAL
# ═══════════════════════════════════════════════════════════════

# Permitir perf profiling (útil para benchmarking)
kernel.perf_event_paranoid = -1

# Máximo de mensajes de kernel
kernel.printk = 3 3 3 3

