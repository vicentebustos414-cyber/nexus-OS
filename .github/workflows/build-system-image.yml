name: Build ChimeraOS image
env:
  REGISTRY: ghcr.io
  ARTIFACT_IMAGE_NAME: ${{ github.repository }}
  BUILDER_IMAGE_NAME: ${{ github.repository_owner }}/builder

on:
  workflow_call:
    inputs:
      postfix:
        type: string
        description: Postfix used in release.
        default: ''

jobs:
  build-system-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.build_image.outputs.version }}
      display_name: ${{ steps.build_image.outputs.display_name }}
      display_version: ${{ steps.build_image.outputs.display_version }}
      image_filename: ${{ steps.build_image.outputs.image_filename }}
    steps:
      - name: Maximize build space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/share/java
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /opt/az
          df -h
      - name: Install dependencies
        run: sudo snap install oras --classic
      - uses: actions/checkout@v6
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BUILDER_IMAGE_NAME }}
      - uses: actions/download-artifact@v8
        with:
            pattern: AUR-packages*
            merge-multiple: true
            path: aur-pkgs/
      - uses: actions/download-artifact@v8
        with:
            pattern: Packages*
            merge-multiple: true
            path: pkgs/
      - name: Build system image
        id: build_image
        run: |
          docker pull ${{ steps.meta.outputs.tags }}
          docker run -u root --rm --entrypoint=/workdir/build-image.sh -v $(pwd):/workdir -v $(pwd)/output:/output -v $GITHUB_OUTPUT:$GITHUB_OUTPUT -e "GITHUB_OUTPUT=$GITHUB_OUTPUT" --privileged=true ${{ steps.meta.outputs.tags }} $(echo ${GITHUB_SHA} | cut -c1-7)
          echo -e "$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.meta.outputs.tags }})" > output/container.txt
      - name: Upload system image artifact
        id: upload_system_image_artifact
        continue-on-error: true
        env:
          ARTIFACT_IMAGE_NAME: ${{ env.ARTIFACT_IMAGE_NAME }}
        run: |
            cd output
            oras login --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
            oras push ${{ env.REGISTRY }}/${ARTIFACT_IMAGE_NAME,,}:${{ steps.build_image.outputs.version }} ${{ steps.build_image.outputs.image_filename }}
            oras tag  ${{ env.REGISTRY }}/${ARTIFACT_IMAGE_NAME,,}:${{ steps.build_image.outputs.version }} unstable
      - name: List output files
        run: |
          echo "=== Output directory contents ==="
          ls -lah output/ || echo "output/ directory not found"
          echo "=== Build outputs ==="
          echo "version: ${{ steps.build_image.outputs.version }}"
          echo "display_name: ${{ steps.build_image.outputs.display_name }}"
          echo "display_version: ${{ steps.build_image.outputs.display_version }}"
          echo "image_filename: ${{ steps.build_image.outputs.image_filename }}"
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.build_image.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.build_image.outputs.display_name }} ${{ steps.build_image.outputs.display_version }} ${{ inputs.postfix }}
          body: |
            NexusOS v1.0 Gaming ISO - CachyOS kernel with BORE scheduler, system recovery (Snapper+Timeshift), gaming optimizations.

            ## Descargar ISO
            La imagen ISO supera el límite de 2GB de GitHub Releases y está disponible vía OCI/ORAS:

            ```
            oras pull ghcr.io/vicentebustos414-cyber/nexus-os:${{ steps.build_image.outputs.version }}
            ```

            O la etiqueta estable:
            ```
            oras pull ghcr.io/vicentebustos414-cyber/nexus-os:unstable
            ```
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            output/*.txt